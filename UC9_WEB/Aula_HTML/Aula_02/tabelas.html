<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em HTML</title>
  </head>
  <body>
    <!-- Tabela de dados -->
    <table border="1">
      <!-- A tag <table> é usada para criar uma tabela em HTML -->
      <!-- O elemento <thead> define o cabeçalho da tabela -->
      <thead>
        <tr>
          <!-- A tag <tr> define uma linha na tabela -->
          <!-- A tag <th> define uma célula de cabeçalho, que é geralmente-->
          <th>Nome</th>
          <th>Idade</th>
          <th>Cidade</th>
        </tr>
      </thead>
      <tbody>
        <!-- O elemento <tbody> define o corpo da tabela -->
        <!-- A tag <td> define uma célula de dados em uma linha da tabela -->
        <tr>
          <td>José</td>
          <!-- A tag <td> é usada para criar uma célula de dados em uma linha da tabela -->
          <td>30</td>
          <td>São Paulo</td>
        </tr>
        <tr>
          <!-- Outra linha de dados -->
          <td>Ana</td>
          <td>25</td>
          <td>Rio de Janeiro</td>
        </tr>
      </tbody>
      <!-- O elemento <tfoot> define o rodapé da tabela -->
      <tfoot>
        <tr>
          <td colspan="3">Total de pessoas: 2</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
