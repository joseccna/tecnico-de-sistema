<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Configuração de caracteres -->
    <meta charset="UTF-8" />

    <!-- Responsividade (importante para mobile) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Arquivo de estilos -->
    <link rel="stylesheet" href="style.css" />

    <!-- Título da página -->
    <title>Card</title>
  </head>

  <body>
    <!-- Cabeçalho (pode ser usado futuramente) -->
    <header></header>

    <main>
      <!-- Container principal:
           Responsável por centralizar o card na tela usando Flexbox -->
      <div class="container">

        <!-- Card do perfil:
             Estrutura principal com informações do usuário -->
        <div class="card">

          <!-- Avatar:
               Representa as iniciais do usuário (pode virar imagem depois) -->
          <div class="avatar">JF</div>

          <!-- Nome do usuário -->
          <h2>José Fernando</h2>

          <!-- Cargo / profissão -->
          <p class="cargo">Desenvolvedor Front-End</p>

          <!-- Descrição / bio do usuário -->
          <p class="descricao">
            Apaixonado por criar experiências digitais incríveis.
            Especializado em HTML, CSS e JavaScript.
          </p>

          <!-- Título da seção de habilidades -->
          <h3>Habilidades</h3>

          <!-- Lista de habilidades:
               Usando Flexbox para alinhar e quebrar linha automaticamente -->
          <div class="skills">
            <span>HTML5</span>
            <span>CSS3</span>
            <span>JavaScript</span>
            <span>Flexbox</span>
          </div>

          <!-- Botão de ação -->
          <button>Entre em Contato</button>

        </div>
      </div>
    </main>

    <!-- Rodapé (reservado para uso futuro) -->
    <footer></footer>
  </body>
</html>
